<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Météo IoT</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-6">

    <div class="max-w-5xl mx-auto space-y-6">
        <header class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-xs">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">Station Météo Connectée</h1>
                <p class="text-sm text-slate-500">Données en temps réel via Supabase</p>
            </div>
            <div class="flex items-center space-x-2">
                <label for="timeframe" class="text-sm font-medium">Période :</label>
                <select id="timeframe" class="bg-slate-100 border-0 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500" onchange="fetchHistory()">
                    <option value="1h">Dernière heure</option>
                    <option value="24h" selected>Dernières 24 heures</option>
                    <option value="1w">Dernière semaine</option>
                </select>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-xs border-l-4 border-rose-500 flex flex-col justify-between">
                <span class="text-sm font-semibold uppercase tracking-wider text-slate-400">Température</span>
                <span id="current-temp" class="text-5xl font-extrabold text-slate-900 my-4">-- °C</span>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-xs border-l-4 border-blue-500 flex flex-col justify-between">
                <span class="text-sm font-semibold uppercase tracking-wider text-slate-400">Humidité</span>
                <span id="current-hum" class="text-5xl font-extrabold text-slate-900 my-4">-- %</span>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-xs">
            <div class="h-96 w-full">
                <canvas id="iotChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ehrcchqwechaqrsvqosa.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVocmNjaHF3ZWNoYXFyc3Zxb3NhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTQ5NTQsImV4cCI6MjA5Nzg5MDk1NH0.FxaBGZd5-2JWNCz8c5HyQ3YSuD35uqAW4qN2qH0dqOI"; 
        
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ctx = document.getElementById('iotChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Température (°C)',
                        data: [],
                        borderColor: '#f43f5e',
                        backgroundColor: 'transparent',
                        yAxisID: 'y',
                        tension: 0.25
                    },
                    {
                        label: 'Humidité (%)',
                        data: [],
                        borderColor: '#3b82f6',
                        backgroundColor: 'transparent',
                        yAxisID: 'y1',
                        tension: 0.25
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { type: 'linear', position: 'left', title: { display: true, text: 'Température (°C)' } },
                    y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Humidité (%)' } }
                }
            }
        });

        async function fetchHistory() {
            const timeframe = document.getElementById('timeframe').value;
            const DateSeuil = new Date();

            if (timeframe === '1h') {
                DateSeuil.setHours(DateSeuil.getHours() - 1);
            } else if (timeframe === '24h') {
                DateSeuil.setHours(DateSeuil.getHours() - 24);
            } else if (timeframe === '1w') {
                DateSeuil.setDate(DateSeuil.getDate() - 7);
            }

            let { data, error } = await db
                .from('mesures')
                .select('created_at, temperature, humidity')
                .gte('created_at', DateSeuil.toISOString())
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Erreur Supabase :", error);
                return;
            }

            // SÉCURITÉ : Si la base ne renvoie aucun point sur cette période
            if (!data || data.length === 0) {
                chart.data.labels = [];
                chart.data.datasets[0].data = [];
                chart.data.datasets[1].data = [];
                chart.update();
                return;
            }
            
            data.reverse();

            chart.data.labels = data.map(m => {
                const d = new Date(m.created_at);
                return timeframe === '1h' 
                    ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    : d.toLocaleDateString([], { day: '2-digit', month: '2-digit' }) + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            });

            chart.data.datasets[0].data = data.map(m => m.temperature);
            chart.data.datasets[1].data = data.map(m => m.humidity);

            updateCurrentWidgets(data[data.length - 1]);
            chart.update();
        }

        function updateCurrentWidgets(mesure) {
            if (!mesure) return;
            document.getElementById('current-temp').innerText = mesure.temperature.toFixed(1) + " °C";
            document.getElementById('current-hum').innerText = mesure.humidity.toFixed(1) + " %";
        }

        // Écoute des envois en direct de l'ESP32
        db
            .channel('schema-db-changes')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mesures' },
                (payload) => {
                    const newMesure = payload.new;
                    const timeframe = document.getElementById('timeframe').value;

                    updateCurrentWidgets(newMesure);

                    const d = new Date(newMesure.created_at);
                    const label = timeframe === '1h' 
                        ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                        : d.toLocaleDateString([], { day: '2-digit', month: '2-digit' }) + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    chart.data.labels.push(label);
                    chart.data.datasets[0].data.push(newMesure.temperature);
                    chart.data.datasets[1].data.push(newMesure.humidity);

                    chart.update();
                }
            ).subscribe();

        fetchHistory();
    </script>
</body>
</html>
