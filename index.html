<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Météo • Live</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100/70 text-slate-800 min-h-screen p-3 sm:p-6 font-sans antialiased selection:bg-blue-500 selection:text-white">

    <div class="max-w-4xl mx-auto space-y-4 sm:space-y-6">
        
        <header class="bg-white/80 backdrop-blur-md border border-slate-200/60 p-4 sm:p-6 rounded-3xl shadow-xl shadow-slate-200/50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <span class="relative flex h-2.5 w-2.5">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                    </span>
                    <span class="text-xs font-bold uppercase tracking-wider text-emerald-600">Capteur actif</span>
                </div>
                <h1 class="text-2xl sm:text-3xl font-black text-slate-900 tracking-tight">Station Météo</h1>
                <p class="text-xs sm:text-sm text-slate-400 font-medium">Actualisation en temps réel</p>
            </div>

            <div class="bg-slate-200/70 p-1 rounded-2xl flex items-center justify-between gap-1 shadow-inner border border-slate-300/50 w-full sm:w-auto">
                <button id="btn-1h" onclick="setTimeframe('1h')" class="flex-1 sm:flex-initial px-3 sm:px-4 py-1.5 rounded-xl text-xs sm:text-sm font-bold text-slate-400 hover:text-slate-600 transition-all cursor-pointer">1H</button>
                <button id="btn-24h" onclick="setTimeframe('24h')" class="flex-1 sm:flex-initial px-3 sm:px-4 py-1.5 rounded-xl text-xs sm:text-sm font-black bg-white text-slate-900 shadow-sm transition-all scale-102 cursor-pointer">24H</button>
                <button id="btn-1w" onclick="setTimeframe('1w')" class="flex-1 sm:flex-initial px-3 sm:px-4 py-1.5 rounded-xl text-xs sm:text-sm font-bold text-slate-400 hover:text-slate-600 transition-all cursor-pointer">7J</button>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-3 sm:gap-6">
            
            <div class="bg-gradient-to-br from-white to-rose-50/30 border border-rose-100 p-4 sm:p-7 rounded-3xl shadow-xl shadow-rose-500/5 flex flex-col justify-between relative overflow-hidden group hover:shadow-rose-500/10 transition-all">
                <div class="absolute -right-8 -bottom-8 w-28 h-28 bg-rose-400/10 rounded-full blur-xl group-hover:scale-125 transition-transform"></div>
                <div class="flex items-center justify-between">
                    <span class="text-[11px] sm:text-xs font-bold uppercase tracking-wider text-rose-500">Température</span>
                    <div class="p-2 sm:p-2.5 bg-rose-500/10 rounded-xl sm:rounded-2xl text-rose-500">
                        <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M11.5 7v6"/></svg>
                    </div>
                </div>
                <div class="mt-4 sm:mt-6 flex items-baseline">
                    <span id="temp-val" class="text-3xl sm:text-6xl font-black text-slate-900 tracking-tight">--</span>
                    <span class="text-sm sm:text-2xl font-bold text-rose-500 ml-1 sm:ml-1.5">°C</span>
                </div>
            </div>

            <div class="bg-gradient-to-br from-white to-blue-50/30 border border-blue-100 p-4 sm:p-7 rounded-3xl shadow-xl shadow-blue-500/5 flex flex-col justify-between relative overflow-hidden group hover:shadow-blue-500/10 transition-all">
                <div class="absolute -right-8 -bottom-8 w-28 h-28 bg-blue-400/10 rounded-full blur-xl group-hover:scale-125 transition-transform"></div>
                <div class="flex items-center justify-between">
                    <span class="text-[11px] sm:text-xs font-bold uppercase tracking-wider text-blue-500">Humidité</span>
                    <div class="p-2 sm:p-2.5 bg-blue-500/10 rounded-xl sm:rounded-2xl text-blue-500">
                        <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>
                    </div>
                </div>
                <div class="mt-4 sm:mt-6 flex items-baseline">
                    <span id="hum-val" class="text-3xl sm:text-6xl font-black text-slate-900 tracking-tight">--</span>
                    <span class="text-sm sm:text-2xl font-bold text-blue-500 ml-1 sm:ml-1.5">%</span>
                </div>
            </div>

        </div>

        <div class="bg-white border border-slate-200/60 p-4 sm:p-7 rounded-3xl shadow-xl shadow-slate-200/50">
            <div class="flex items-center justify-between mb-4">
                <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Évolution dans le temps</span>
                <span class="text-[10px] font-extrabold bg-slate-100 text-slate-500 px-2.5 py-1 rounded-full">Chart.js 4</span>
            </div>
            <div class="h-64 sm:h-96 w-full">
                <canvas id="iotChart"></canvas>
            </div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://ehrcchqwechaqrsvqosa.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVocmNjaHF3ZWNoYXFyc3Zxb3NhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTQ5NTQsImV4cCI6MjA5Nzg5MDk1NH0.FxaBGZd5-2JWNCz8c5HyQ3YSuD35uqAW4qN2qH0dqOI"; 
        
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        Chart.defaults.font.family = "'Inter', 'system-ui', '-apple-system', 'sans-serif'";

        // Variable globale qui retient l'onglet actif (par défaut 24h)
        let activeTimeframe = '24h';

        const ctx = document.getElementById('iotChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Température (°C)',
                        data: [],
                        borderColor: '#f43f5e',
                        backgroundColor: 'rgba(244, 63, 94, 0.08)',
                        fill: true,
                        borderWidth: 2.5,
                        tension: 0.35,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        yAxisID: 'y',
                    },
                    {
                        label: 'Humidité (%)',
                        data: [],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.08)',
                        fill: true,
                        borderWidth: 2.5,
                        tension: 0.35,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        yAxisID: 'y1',
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { position: 'top', align: 'end', labels: { boxWidth: 10, boxHeight: 10, usePointStyle: true, font: { weight: 'bold', size: 11 } } },
                    tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.9)', padding: 12, borderRadius: 16, titleFont: { size: 11 }, bodyFont: { size: 12, weight: 'bold' } }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { font: { size: 10, weight: '600' }, color: '#94a3b8' } },
                    y: { type: 'linear', position: 'left', grid: { color: '#f1f5f9' }, border: { dash: [4, 4] }, ticks: { font: { size: 10, weight: 'bold' }, color: '#f43f5e' } },
                    y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, ticks: { font: { size: 10, weight: 'bold' }, color: '#3b82f6' } }
                }
            }
        });

        // Fonction déclenchée quand on clique sur une pilule
        function setTimeframe(tf) {
            if (activeTimeframe === tf) return;
            activeTimeframe = tf;

            // Gestion visuelle du bouton cliqué vs les autres
            const options = ['1h', '24h', '1w'];
            options.forEach(item => {
                const btn = document.getElementById(`btn-${item}`);
                if (item === tf) {
                    btn.className = "flex-1 sm:flex-initial px-3 sm:px-4 py-1.5 rounded-xl text-xs sm:text-sm font-black bg-white text-slate-900 shadow-sm transition-all scale-102 cursor-pointer";
                } else {
                    btn.className = "flex-1 sm:flex-initial px-3 sm:px-4 py-1.5 rounded-xl text-xs sm:text-sm font-bold text-slate-400 hover:text-slate-600 transition-all cursor-pointer";
                }
            });

            fetchHistory();
        }

        async function fetchHistory() {
            const DateSeuil = new Date();

            if (activeTimeframe === '1h') DateSeuil.setHours(DateSeuil.getHours() - 1);
            else if (activeTimeframe === '24h') DateSeuil.setHours(DateSeuil.getHours() - 24);
            else if (activeTimeframe === '1w') DateSeuil.setDate(DateSeuil.getDate() - 7);

            let { data, error } = await db
                .from('mesures')
                .select('created_at, temperature, humidity')
                .gte('created_at', DateSeuil.toISOString())
                .order('created_at', { ascending: false });

            if (error || !data || data.length === 0) return;
            
            data.reverse();

            chart.data.labels = data.map(m => {
                const d = new Date(m.created_at);
                return activeTimeframe === '1h' 
                    ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    : d.toLocaleDateString([], { day: '2-digit', month: '2-digit' }) + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            });

            chart.data.datasets[0].data = data.map(m => m.temperature);
            chart.data.datasets[1].data = data.map(m => m.humidity);

            updateWidgets(data[data.length - 1]);
            chart.update();
        }

        function updateWidgets(mesure) {
            if (!mesure) return;
            document.getElementById('temp-val').innerText = mesure.temperature.toFixed(1);
            document.getElementById('hum-val').innerText = mesure.humidity.toFixed(1);
        }

        db.channel('schema-db-changes')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mesures' },
                (payload) => {
                    const newMesure = payload.new;
                    updateWidgets(newMesure);

                    const d = new Date(newMesure.created_at);
                    const label = activeTimeframe === '1h' 
                        ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                        : d.toLocaleDateString([], { day: '2-digit', month: '2-digit' }) + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    chart.data.labels.push(label);
                    chart.data.datasets[0].data.push(newMesure.temperature);
                    chart.data.datasets[1].data.push(newMesure.humidity);
                    chart.update();
                }
            ).subscribe();

        fetchHistory();
    </script>
</body>
</html>
